name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  scan-and-Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarQUbe Scan Code
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
         projectkey: ${{ secrets.SONAR_PROJECT_KEY }}
         hostUrl: ${{ secrets.SONAR_HOST_URL }}

      - name: Run Test
        run: |
          echo "No test written in source code yet but i will do it  Later"
  build:
    need: scan-and-Test
    runs-on: ubuntu-latest
    steps:

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/summit-home:latest .
      - name: Trivy scan For Docker Images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/summit-home:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/summit-home:latest
  deploy:
    need: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy To AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop summit-home || true
            sudo docker rm summit-home || true

            sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/summit-home:latest || true

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/summit-home:latest

            sudo docker run -d \
              --name summit-home \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/summit-home:latest
